<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AskTim logo</title>
  <desc>AskTim AI assistant logo — stylised robot face inside concentric gradient rings</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="94" fill="url(#g3)" stroke="url(#g1)" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- mid ring -->
  <circle cx="100" cy="100" r="72" fill="url(#g2)" stroke="url(#g1)" stroke-width="1"/>
  <!-- inner disc -->
  <circle cx="100" cy="100" r="50" fill="url(#g1)"/>

  <!-- robot head -->
  <rect x="69" y="78" width="62" height="48" rx="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>

  <!-- antenna -->
  <line x1="100" y1="78" x2="100" y2="68" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="100" cy="65" r="3.5" fill="rgba(255,255,255,0.95)"/>

  <!-- eyes -->
  <rect x="77" y="89" width="12" height="9" rx="2.5" fill="rgba(255,255,255,0.95)"/>
  <rect x="111" y="89" width="12" height="9" rx="2.5" fill="rgba(255,255,255,0.95)"/>
  <!-- pupils -->
  <rect x="80" y="91" width="6" height="5" rx="1.5" fill="#6366f1"/>
  <rect x="114" y="91" width="6" height="5" rx="1.5" fill="#6366f1"/>

  <!-- smile -->
  <path d="M82 109 Q100 120 118 109" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>

  <!-- ears -->
  <rect x="61" y="90" width="8" height="14" rx="3" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <rect x="131" y="90" width="8" height="14" rx="3" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- cardinal dots -->
  <circle cx="100" cy="6" r="3" fill="url(#g1)" opacity="0.55"/>
  <circle cx="100" cy="194" r="3" fill="url(#g1)" opacity="0.55"/>
  <circle cx="6" cy="100" r="3" fill="url(#g1)" opacity="0.55"/>
  <circle cx="194" cy="100" r="3" fill="url(#g1)" opacity="0.55"/>
</svg>
